name: Generate Stats Images

on:
  push:
    branches:
      - master
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2 tag
      with:
        version: 0.16.0

    - name: Build
      run: |
        zig build

    - name: Generate images
      run: |
        mkdir -p generated
        ./zig-out/bin/github-stats
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        EXCLUDE_REPOS: ${{ secrets.EXCLUDED }}
        EXCLUDE_LANGS: ${{ secrets.EXCLUDED_LANGS }}
        EXCLUDE_PRIVATE: "false"
        OVERVIEW_OUTPUT_FILE: generated/overview.svg
        LANGUAGES_OUTPUT_FILE: generated/languages.svg
        SILENT: "true"
        # TODO: Remove this when they get their API working again
        # https://github.com/orgs/community/discussions/192970
        MAX_RETRIES: 5

    - name: Commit to the repo
      run: |
        git config --global user.name "didntpot"
        git config --global user.email "104190360+didntpot@users.noreply.github.com"
        git add generated/
        # Force the build to succeed, even if no files were changed
        git commit -m 'Update generated files' || true
        git push
